<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高级去水印</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:16px;background:#f4f4f4;font-family:system-ui}
  .box{background:white;padding:20px;border-radius:16px}
  h3{margin-top:0}
  canvas{max-width:100%;border-radius:10px; border:1px solid #eee}
  button{width:100%;padding:14px;margin:6px 0;border:none;border-radius:12px;background:#007aff;color:white;font-size:16px}
  .btn-red{background:#ff3b30}
</style>
</head>
<body>
<div class="box">
  <h3>高级去水印（纹理修复）</h3>
  <input type="file" id="file" accept="image/*"><br><br>
  <canvas id="canvas"></canvas><br>
  <button onclick="removeWatermark()">一键清除底部水印</button>
  <button onclick="reset()" class="btn-red">恢复原图</button>
  <button onclick="download()">保存图片</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let img = null;
let original = null;

document.getElementById('file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      original = ctx.getImageData(0,0,canvas.width,canvas.height);
    }
    img.src = e.target.result;
  }
  r.readAsDataURL(f);
})

function removeWatermark() {
  if (!img) { alert("请先上传图片"); return; }
  ctx.putImageData(original,0,0);

  const w = canvas.width;
  const h = canvas.height;
  const yStart = Math.floor(h * 0.88);
  const yEnd = Math.floor(h * 0.97);

  const data = ctx.getImageData(0,0,w,h).data;
  const out = ctx.createImageData(w, h);
  const outData = out.data;
  outData.set(data);

  const radius = 4;
  for (let y = yStart; y < yEnd; y++) {
    for (let x = 0; x < w; x++) {
      let r = 0, g = 0, b = 0, count = 0;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const nx = x + dx;
          const ny = y + dy;
          if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
          if (ny >= yStart && ny < yEnd) continue;
          const i = (ny * w + nx) * 4;
          r += data[i];
          g += data[i+1];
          b += data[i+2];
          count++;
        }
      }
      if (count > 0) {
        const i = (y * w + x) * 4;
        outData[i]   = r / count;
        outData[i+1] = g / count;
        outData[i+2] = b / count;
        outData[i+3] = 255;
      }
    }
  }
  ctx.putImageData(out, 0, 0);
  alert("处理完成！");
}

function reset() {
  if (original) ctx.putImageData(original,0,0);
}

function download() {
  const a = document.createElement('a');
  a.download = '去水印完成.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
