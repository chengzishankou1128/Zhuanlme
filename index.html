<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>全自动去水印工具</title>
<style>
  *{box-sizing:border-box;font-family:system-ui,sans-serif}
  body{max-width:900px;margin:20px auto;background:#f4f4f4;padding:0 20px}
  .box{background:#fff;padding:25px;border-radius:12px;box-shadow:0 2px 10px #0001}
  h2{margin-top:0;color:#222}
  .btn{padding:10px 20px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;margin:5px}
  .btn.danger{background:#dc3545}
  canvas{max-width:100%;border:2px dashed #ccc;margin:10px 0}
</style>
</head>
<body>
<div class="box">
  <h2>全自动图片去水印（自动识别）</h2>
  <input type="file" id="file" accept="image/*"><br>
  <canvas id="c"></canvas><br>
  <button class="btn" onclick="autoDetectAndRemove()">自动去水印</button>
  <button class="btn" onclick="downloadImg()">下载</button>
  <button class="btn danger" onclick="reset()">重置</button>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let img = null;
let ori = null;

document.getElementById('file').onchange = e => {
  const f = e.target.files[0];
  if(!f)return;
  const r = new FileReader();
  r.onload = ev => {
    img = new Image();
    img.onload = () => {
      const mw = 800;
      const ratio = img.width/img.height;
      const w = Math.min(img.width,mw);
      const h = w/ratio;
      c.width = w; c.height = h;
      ctx.drawImage(img,0,0,w,h);
      ori = ctx.getImageData(0,0,w,h);
    }
    img.src = ev.target.result;
  }
  r.readAsDataURL(f);
}

function autoDetectAndRemove(){
  if(!img){alert("请先上传图片");return;}
  ctx.putImageData(ori,0,0);
  const w = c.width, h = c.height;
  const d = ctx.getImageData(0,0,w,h).data;

  let mask = [];
  const edge = 20;

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i = (y*w+x)*4;
      let isWatermark = false;

      if(x>w-edge && y>h-edge && x<w && y<h){
        const a = d[i+3];
        if(a>20 && a<240) isWatermark=true;
      }

      if(x>w-120 && y>h-60 && x<w && y<h){
        isWatermark=true;
      }
      mask.push(isWatermark?255:0);
    }
  }

  const rad = 3;
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(mask[y*w+x]){
        let cnt=0, r=0,g=0,b=0;
        for(let dy=-rad;dy<=rad;dy++){
          for(let dx=-rad;dx<=rad;dx++){
            const nx=x+dx, ny=y+dy;
            if(nx>=0&&nx<w&&ny>=0&&ny<h && !mask[ny*w+nx]){
              const j=(ny*w+nx)*4;
              r+=d[j]; g+=d[j+1]; b+=d[j+2]; cnt++;
            }
          }
        }
        if(cnt>0){
          const j=(y*w+x)*4;
          d[j]   = r/cnt;
          d[j+1] = g/cnt;
          d[j+2] = b/cnt;
        }
      }
    }
  }

  const out = ctx.getImageData(0,0,w,h);
  out.data.set(d);
  ctx.putImageData(out,0,0);
  alert("自动去水印完成！");
}

function downloadImg(){
  if(!img){alert("请先上传图片");return;}
  const a = document.createElement('a');
  a.download = '自动去水印_'+Date.now()+'.jpg';
  a.href = c.toDataURL('image/jpeg',0.95);
  a.click();
}

function reset(){
  if(!img)return;
  ctx.putImageData(ori,0,0);
}
</script>
</body>
</html>
