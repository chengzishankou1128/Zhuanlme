<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消除笔 - 去水印</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:12px;background:#f4f4f4;font-family:system-ui}
.box{background:white;padding:16px;border-radius:14px}
h3{margin-top:0;font-size:18px}
canvas{max-width:100%;display:block;background:#fff;border:1px solid #eee}
button{width:100%;padding:14px 0;margin:6px 0;border:none;border-radius:12px;background:#007aff;color:white;font-size:16px}
.btn-red{background:#ff3b30}
</style>
</head>
<body>
<div class="box">
  <h3>消除笔（涂抹去水印）</h3>
  <input type="file" id="file" accept="image/*"><br><br>
  <canvas id="c"></canvas><br>
  <button onclick="reset()">恢复原图</button>
  <button onclick="save()">保存图片</button>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let img = null;
let oriData = null;
let lastX = null, lastY = null;
const brushSize = 12;

// 上传图片
document.getElementById('file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    img = new Image();
    img.onload = () => {
      c.width = img.width;
      c.height = img.height;
      ctx.drawImage(img, 0, 0);
      oriData = ctx.getImageData(0,0,c.width,c.height);
    }
    img.src = e.target.result;
  }
  r.readAsDataURL(f);
})

// 触摸涂抹（手机专用）
c.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = c.getBoundingClientRect();
  lastX = (t.clientX - rect.left) * c.width / rect.width;
  lastY = (t.clientY - rect.top) * c.height / rect.height;
});

c.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!img) return;
  const t = e.touches[0];
  const rect = c.getBoundingClientRect();
  const x = (t.clientX - rect.left) * c.width / rect.width;
  const y = (t.clientY - rect.top) * c.height / rect.height;
  paintLine(lastX, lastY, x, y);
  lastX = x;
  lastY = y;
});

// 画线消除
function paintLine(x1,y1,x2,y2) {
  const w = c.width, h = c.height;
  const data = ctx.getImageData(0,0,w,h).data;
  const out = ctx.getImageData(0,0,w,h);
  const outData = out.data;

  const dx = x2-x1, dy = y2-y1;
  const dist = Math.hypot(dx,dy);
  for(let i=0;i<=dist;i+=1){
    const px = x1 + dx*i/dist;
    const py = y1 + dy*i/dist;
    erasePixel(px, py, data, outData, w, h);
  }
  ctx.putImageData(out,0,0);
}

// 消除核心（真正的消除笔算法）
function erasePixel(cx, cy, data, outData, w, h) {
  const r = brushSize;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      const d = Math.hypot(dx,dy);
      if(d>r) continue;
      const x = Math.round(cx + dx);
      const y = Math.round(cy + dy);
      if(x<0||x>=w||y<0||y>=h) continue;

      let sumR=0, sumG=0, sumB=0, cnt=0;
      const sr = 4;
      for(let sy=-sr;sy<=sr;sy++){
        for(let sx=-sr;sx<=sr;sx++){
          const nx = x+sx;
          const ny = y+sy;
          if(nx<0||nx>=w||ny<0||ny>=h) continue;
          const nd = Math.hypot(sx,sy);
          if(nd>sr) continue;
          const i = (ny*w + nx)*4;
          sumR += data[i];
          sumG += data[i+1];
          sumB += data[i+2];
          cnt++;
        }
      }
      if(cnt>0){
        const i = (y*w + x)*4;
        outData[i]   = sumR/cnt;
        outData[i+1] = sumG/cnt;
        outData[i+2] = sumB/cnt;
        outData[i+3] = 255;
      }
    }
  }
}

// 恢复原图
function reset(){
  if(oriData) ctx.putImageData(oriData,0,0);
}

// 保存
function save(){
  if(!img){alert("请先上传图片");return}
  const a = document.createElement('a');
  a.download = '消除笔结果.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
