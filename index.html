<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>自动强力去水印</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:12px;background:#f4f4f4;font-family:system-ui}
.box{background:white;padding:16px;border-radius:14px}
h3{margin-top:0;font-size:18px}
canvas{max-width:100%;display:block;background:#fff;border:1px solid #eee}
button{width:100%;padding:14px 0;margin:6px 0;border:none;border-radius:12px;background:#007aff;color:white;font-size:16px}
.btn-red{background:#ff3b30}
</style>
</head>
<body>
<div class="box">
  <h3>自动强力去水印（深度消除）</h3>
  <input type="file" id="file" accept="image/*"><br><br>
  <canvas id="c"></canvas><br>
  <button onclick="autoStrongRemove()">🔥 自动深度消除</button>
  <button onclick="reset()">恢复原图</button>
  <button onclick="save()">保存图片</button>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let img = null;
let oriData = null;

document.getElementById('file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    img = new Image();
    img.onload = () => {
      c.width = img.width;
      c.height = img.height;
      ctx.drawImage(img, 0, 0);
      oriData = ctx.getImageData(0,0,c.width,c.height);
    }
    img.src = e.target.result;
  }
  r.readAsDataURL(f);
})

function autoStrongRemove() {
  if (!img) { alert("请先上传图片"); return; }
  ctx.putImageData(oriData, 0, 0);

  const w = c.width;
  const h = c.height;
  const yStart = Math.floor(h * 0.87);
  const yEnd = Math.floor(h * 0.98);

  const data = ctx.getImageData(0,0,w,h).data;
  const out = ctx.getImageData(0,0,w,h);
  const outData = out.data;

  // 超强消除算法（深度融合）
  for (let y = yStart; y < yEnd; y++) {
    for (let x = 0; x < w; x++) {
      let sumR = 0, sumG = 0, sumB = 0, cnt = 0;
      const sampleRange = 10; // 范围更大，融合更自然
      for (let dy = -sampleRange; dy <= sampleRange; dy++) {
        for (let dx = -sampleRange; dx <= sampleRange; dx++) {
          const nx = x + dx;
          const ny = y + dy - sampleRange;
          if (nx < 0 || nx >= w || ny < 0 || ny >= yStart) continue;
          const i = (ny * w + nx) * 4;
          sumR += data[i];
          sumG += data[i+1];
          sumB += data[i+2];
          cnt++;
        }
      }
      if (cnt > 0) {
        const i = (y * w + x) * 4;
        outData[i]   = sumR / cnt;
        outData[i+1] = sumG / cnt;
        outData[i+2] = sumB / cnt;
        outData[i+3] = 255;
      }
    }
  }

  ctx.putImageData(out, 0, 0);
  alert("✅ 自动深度消除完成！");
}

function reset() {
  if (oriData) ctx.putImageData(oriData,0,0);
}

function save() {
  const a = document.createElement('a');
  a.download = '已深度去水印.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
